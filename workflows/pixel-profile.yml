name: generate-and-upload-card
on:
  schedule:
    - cron: "0 */24 * * *" # 每 24 小时自动更新一次数据
  workflow_dispatch: # 允许手动点击运行
  push:
    branches:
      - main # 如果你的主分支名叫 master，请改为 master

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: generate github stats card
        uses: LuciNyan/pixel-profile/action@main
        with:
          outputs: |
            dist/github-stats?username=<你的用户名>&theme=fuji
            dist/github-stats-dark?username=<你的用户名>&theme=crt
      - name: push cards to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output # 生成的图片会被推送到名为 output 的分支
          build_dir: dist
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}